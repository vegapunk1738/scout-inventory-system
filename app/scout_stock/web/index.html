<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Scout Inventory System">

  <!--
    viewport-fit=cover: lets the Flutter canvas extend to the physical screen
    edges (behind the notch and home indicator) so no browser background
    colour bleeds through as white bars.

    apple-mobile-web-app-status-bar-style: black-translucent pairs with
    viewport-fit=cover so the status bar is transparent over your content.

    Flutter's MediaQuery / SafeArea widgets then keep every interactive
    UI element (buttons, lists, etc.) inside the safe zone automatically.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="scout_stock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>

  <title>Scout Stock</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /*
      Black background so the safe-area inset zones (behind notch / home
      indicator) never flash white.  The scan page is dark; other pages
      paint their own #F7F8FA scaffold background on top immediately.
    */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      height: -webkit-fill-available; /* iOS Safari real viewport height */
      overflow: hidden;
      overscroll-behavior: none;
    }

    /*
      Force Flutter's view element to cover the full physical screen,
      including safe-area insets, on iOS Safari with viewport-fit=cover.
    */
    flutter-view {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
